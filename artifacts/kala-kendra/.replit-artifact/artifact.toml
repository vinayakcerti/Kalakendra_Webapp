kind = "web"
previewPath = "/"
title = "Kala Kendra Sweden"
version = "1.0.0"
id = "artifacts/kala-kendra"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22290

[services.development]
run = "pnpm --filter @workspace/kala-kendra run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kala-kendra", "run", "build" ]
publicDir = "artifacts/kala-kendra/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22290"
BASE_PATH = "/"
