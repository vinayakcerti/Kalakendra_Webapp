openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.2.0
  description: Kala Kendra Sweden API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: admissions
    description: Admission applications
  - name: students
    description: Enrolled students
  - name: batches
    description: Course batches
  - name: enquiries
    description: Public contact enquiries
  - name: stats
    description: Dashboard statistics
  - name: settings
    description: School settings
  - name: attendance
    description: Student attendance records
  - name: reminderRuns
    description: Fee reminder job run history

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ─── ADMISSIONS ───────────────────────────────────────────────────────────
  /admissions:
    get:
      operationId: listAdmissions
      tags: [admissions]
      summary: List all admission applications
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, under_review, accepted, waitlisted, rejected]
        - name: batch
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of admissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Admission"
    post:
      operationId: createAdmission
      tags: [admissions]
      summary: Submit a new admission application (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdmissionBody"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admission"

  /admissions/{id}:
    get:
      operationId: getAdmission
      tags: [admissions]
      summary: Get a single admission application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Admission found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admission"
        "404":
          description: Not found
    patch:
      operationId: updateAdmission
      tags: [admissions]
      summary: Update admission status or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdmissionBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Admission"
    delete:
      operationId: deleteAdmission
      tags: [admissions]
      summary: Delete an admission application
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /admissions/{id}/enrol:
    post:
      operationId: enrolAdmission
      tags: [admissions]
      summary: Convert an accepted admission into an enrolled student record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EnrolAdmissionBody"
      responses:
        "201":
          description: Student enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "400":
          description: Already enrolled or admission not accepted
        "404":
          description: Admission not found

  # ─── STUDENTS ─────────────────────────────────────────────────────────────
  /students:
    get:
      operationId: listStudents
      tags: [students]
      summary: List all enrolled students
      parameters:
        - name: batchId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, inactive, withdrawn]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of students
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Student"
    post:
      operationId: createStudent
      tags: [students]
      summary: Enrol a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentBody"
      responses:
        "201":
          description: Student enrolled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"

  /students/{id}:
    get:
      operationId: getStudent
      tags: [students]
      summary: Get a single student
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Student found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
        "404":
          description: Not found
    patch:
      operationId: updateStudent
      tags: [students]
      summary: Update student details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStudentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Student"
    delete:
      operationId: deleteStudent
      tags: [students]
      summary: Remove a student record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /students/{studentId}/notes:
    get:
      operationId: listStudentNotes
      tags: [students]
      summary: List progress notes for a student, newest first
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StudentNote"
    post:
      operationId: createStudentNote
      tags: [students]
      summary: Add a progress note for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStudentNoteBody"
      responses:
        "201":
          description: Created note
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StudentNote"

  /students/{studentId}/notes/{noteId}:
    delete:
      operationId: deleteStudentNote
      tags: [students]
      summary: Delete a progress note
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: noteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  # ─── FEES ─────────────────────────────────────────────────────────────────
  /fees:
    get:
      operationId: listAllFees
      tags: [fees]
      summary: List all fee records across all students
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, overdue, waived]
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of all fees with student info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeWithStudent"

  /students/{studentId}/fees:
    get:
      operationId: listFees
      tags: [fees]
      summary: List all fee records for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, paid, overdue, waived]
      responses:
        "200":
          description: List of fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FeeRecord"
    post:
      operationId: createFee
      tags: [fees]
      summary: Create a new fee record for a student
      parameters:
        - name: studentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeeBody"
      responses:
        "201":
          description: Fee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecord"

  /attendance:
    get:
      operationId: listAttendance
      tags: [attendance]
      summary: List attendance records with optional filters
      parameters:
        - name: batchId
          in: query
          schema:
            type: string
            format: uuid
        - name: studentId
          in: query
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
            format: date
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Attendance records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AttendanceRecord"
    post:
      operationId: recordAttendance
      tags: [attendance]
      summary: Record attendance for a batch session (upserts existing entries)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordAttendanceBody"
      responses:
        "201":
          description: Attendance recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: integer
                required: [saved]

  /attendance/{id}:
    patch:
      operationId: updateAttendance
      tags: [attendance]
      summary: Update a single attendance entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAttendanceBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRecord"
    delete:
      operationId: deleteAttendance
      tags: [attendance]
      summary: Delete an attendance entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /fees/mark-overdue:
    post:
      operationId: markFeesOverdue
      tags: [fees]
      summary: Mark all pending fees whose due date is in the past as overdue
      responses:
        "200":
          description: Count of updated fees
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                required: [updated]

  /fees/bulk:
    post:
      operationId: bulkCreateFees
      tags: [fees]
      summary: Create the same fee for all active students (optionally filtered by batch)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkCreateFeesBody"
      responses:
        "201":
          description: Fees created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkCreateFeesResponse"

  /fees/{id}:
    patch:
      operationId: updateFee
      tags: [fees]
      summary: Update a fee record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeeBody"
      responses:
        "200":
          description: Updated fee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeeRecord"
    delete:
      operationId: deleteFee
      tags: [fees]
      summary: Delete a fee record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  # ─── BATCHES ──────────────────────────────────────────────────────────────
  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      summary: List all course batches
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
        - name: query
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Batch"
    post:
      operationId: createBatch
      tags: [batches]
      summary: Create a new batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBatchBody"
      responses:
        "201":
          description: Batch created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"

  /batches/{id}:
    get:
      operationId: getBatch
      tags: [batches]
      summary: Get a single batch with student details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Batch with students
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchDetail"
        "404":
          description: Not found
    patch:
      operationId: updateBatch
      tags: [batches]
      summary: Update a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBatchBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
    delete:
      operationId: deleteBatch
      tags: [batches]
      summary: Delete a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  # ─── ENQUIRIES ────────────────────────────────────────────────────────────
  /enquiries:
    get:
      operationId: listEnquiries
      tags: [enquiries]
      summary: List all contact enquiries
      parameters:
        - name: read
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of enquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Enquiry"
    post:
      operationId: createEnquiry
      tags: [enquiries]
      summary: Submit a contact enquiry (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnquiryBody"
      responses:
        "201":
          description: Enquiry received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"

  /enquiries/{id}:
    patch:
      operationId: updateEnquiry
      tags: [enquiries]
      summary: Mark enquiry as read or add admin notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnquiryBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Enquiry"

  /activity:
    get:
      operationId: listActivity
      tags: [stats]
      summary: Recent activity feed across all entities
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Activity items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ─── SETTINGS ─────────────────────────────────────────────────────────────
  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get school settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolSettings"
    patch:
      operationId: updateSettings
      tags: [settings]
      summary: Update school settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SchoolSettings"

  # ─── REMINDER RUNS ────────────────────────────────────────────────────────
  /reminder-runs:
    get:
      operationId: listReminderRuns
      tags: [reminderRuns]
      summary: List fee reminder job run history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: List of reminder job runs, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReminderRun"

  # ─── STATS ────────────────────────────────────────────────────────────────
  /stats/dashboard:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Aggregated admin dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ─── ADMISSIONS ─────────────────────────────────────────────────────────
    Admission:
      type: object
      properties:
        id:
          type: string
          format: uuid
        applicantType:
          type: string
          enum: [adult, child]
        studentName:
          type: string
        studentDob:
          type: string
          format: date
        studentGender:
          type: string
          nullable: true
        studentEmail:
          type: string
          nullable: true
        studentPhone:
          type: string
          nullable: true
        parentName:
          type: string
          nullable: true
        parentRelationship:
          type: string
          nullable: true
        parentEmail:
          type: string
          nullable: true
        parentPhone:
          type: string
          nullable: true
        emergencyName:
          type: string
          nullable: true
        emergencyPhone:
          type: string
          nullable: true
        addressStreet:
          type: string
        addressPostal:
          type: string
        addressCity:
          type: string
        batch:
          type: string
        experience:
          type: string
          enum: [none, some, significant]
        experienceDetails:
          type: string
          nullable: true
        joiningDate:
          type: string
          format: date
          nullable: true
        medicalNotes:
          type: string
          nullable: true
        willStagePerform:
          type: string
          enum: [yes, no, maybe]
        motivation:
          type: string
          nullable: true
        referralSource:
          type: string
          nullable: true
        photoConsent:
          type: string
          enum: [yes-all, yes-internal, no]
        rulesConsent:
          type: string
          enum: [agree, disagree]
        suggestions:
          type: string
          nullable: true
        status:
          type: string
          enum: [pending, under_review, accepted, waitlisted, rejected]
        adminNotes:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        enrolledStudentId:
          type: string
          format: uuid
          nullable: true
          description: Set once the application has been converted into a student record
      required:
        - id
        - applicantType
        - studentName
        - studentDob
        - addressStreet
        - addressPostal
        - addressCity
        - batch
        - experience
        - willStagePerform
        - photoConsent
        - rulesConsent
        - status
        - submittedAt
        - createdAt
        - updatedAt

    CreateAdmissionBody:
      type: object
      properties:
        applicantType:
          type: string
          enum: [adult, child]
        studentName:
          type: string
        studentDob:
          type: string
          format: date
        studentGender:
          type: string
        studentEmail:
          type: string
        studentPhone:
          type: string
        parentName:
          type: string
        parentRelationship:
          type: string
        parentEmail:
          type: string
        parentPhone:
          type: string
        emergencyName:
          type: string
        emergencyPhone:
          type: string
        addressStreet:
          type: string
        addressPostal:
          type: string
        addressCity:
          type: string
        batch:
          type: string
        experience:
          type: string
          enum: [none, some, significant]
        experienceDetails:
          type: string
        joiningDate:
          type: string
          format: date
        medicalNotes:
          type: string
        willStagePerform:
          type: string
          enum: [yes, no, maybe]
        motivation:
          type: string
        referralSource:
          type: string
        photoConsent:
          type: string
          enum: [yes-all, yes-internal, no]
        rulesConsent:
          type: string
          enum: [agree, disagree]
        suggestions:
          type: string
      required:
        - applicantType
        - studentName
        - studentDob
        - addressStreet
        - addressPostal
        - addressCity
        - batch
        - experience
        - willStagePerform
        - photoConsent
        - rulesConsent

    UpdateAdmissionBody:
      type: object
      properties:
        status:
          type: string
          enum: [pending, under_review, accepted, waitlisted, rejected]
        adminNotes:
          type: string

    EnrolAdmissionBody:
      type: object
      description: Optional overrides when converting an admission to a student record
      properties:
        batchId:
          type: string
          format: uuid
          description: Override the batch assignment (if omitted, looked up by the admission's batch code)

    # ─── STUDENTS ───────────────────────────────────────────────────────────
    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        admissionId:
          type: string
          format: uuid
          nullable: true
        fullName:
          type: string
        dob:
          type: string
          format: date
          nullable: true
        batchId:
          type: string
          format: uuid
          nullable: true
        batchName:
          type: string
          nullable: true
        primaryContactName:
          type: string
          nullable: true
        primaryContactEmail:
          type: string
          nullable: true
        primaryContactPhone:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, inactive, withdrawn]
        enrolledAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - fullName
        - status
        - enrolledAt
        - createdAt
        - updatedAt

    CreateStudentBody:
      type: object
      properties:
        admissionId:
          type: string
          format: uuid
        fullName:
          type: string
        dob:
          type: string
          format: date
        batchId:
          type: string
          format: uuid
        primaryContactName:
          type: string
        primaryContactEmail:
          type: string
        primaryContactPhone:
